<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Kuis Toko Hana</title>
<style>
  body{font-family:Segoe UI,sans-serif;max-width:600px;margin:30px auto;padding:20px;background:#fff5f0}
  h1{color:#e76f51;text-align:center}
.soal{background:white;padding:20px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.1);margin-top:20px}
  button{background:#e76f51;color:white;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;margin:5px}
  button:hover{background:#d65a3a}
.benar{color:green;font-weight:bold}
.salah{color:red}
.kosong{text-align:center;padding:50px;color:#888}
</style>
</head>
<body>
<h1>📝 Kuis Toko Hana</h1>
<div id="areaKuis"></div>

<script>
function muatSoal(){
  const teks = localStorage.getItem('soalKuis');
  if(!teks){
    document.getElementById('areaKuis').innerHTML =
      `<div class="kosong">Belum ada soal 😅<br>Admin harus upload soal dulu di halaman admin</div>`;
    return;
  }

  const soalList = teks.split('\n').filter(b => b.trim()!='').map(baris => {
    const [tanya, a, b, c, benar] = baris.split('|');
    return {tanya, opsi:[a,b,c], benar};
  });
  tampilSoal(soalList);
}

function tampilSoal(soalList){
  let html = '';
  soalList.forEach((s,i) => {
    html += `<div class="soal"><b>${i+1}. ${s.tanya}</b><br>`;
    s.opsi.forEach(opt => {
      html += `<button onclick="cekJawaban(${i},'${opt}','${s.benar}',this)">${opt}</button>`;
    });
    html += `<div id="hasil${i}"></div></div>`;
  });
  document.getElementById('areaKuis').innerHTML = html;
}

function cekJawaban(i, jawaban, benar, btn){
  const hasil = document.getElementById('hasil'+i);
  btn.parentElement.querySelectorAll('button').forEach(b=>b.disabled=true);

  if(jawaban === benar){
    hasil.innerHTML = '<p class="benar">✅ Benar!</p>';
  } else {
    hasil.innerHTML = `<p class="salah">❌ Salah. Jawaban: ${benar}</p>`;
  }
}

muatSoal();
</script>
</body>
</html>
