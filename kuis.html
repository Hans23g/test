<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Kuis Toko Hana</title>
<style>
  body{font-family:Segoe UI,sans-serif;max-width:600px;margin:30px auto;padding:20px;background:#fff5f0}
  h1{color:#e76f51;text-align:center}
  textarea{width:100%;height:200px;margin:10px 0;padding:10px;border:2px solid #f4a261;border-radius:8px;font-family:monospace}
 .soal{background:white;padding:20px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.1);margin-top:20px}
  button{background:#e76f51;color:white;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;margin:5px}
  button:hover{background:#d65a3a}
 .benar{color:green;font-weight:bold}
 .salah{color:red}
</style>
</head>
<body>
<h1>📝 Kuis Toko Hana</h1>

<h3>1. Notepad Data Soal - EDIT DI SINI</h3>
<p>Format: Pertanyaan | Jawaban1 | Jawaban2 | Jawaban3 | JawabanBenar</p>
<textarea id="notepad">
Ibu kota Indonesia?|Jakarta|Bandung|Surabaya|Jakarta
Warna logo Toko Hana?|Coral|Biru|Hijau|Coral
Bahan dasar tempe?|Kedelai|Kacang|Beras|Kedelai
</textarea>
<br>
<button onclick="muatSoal()">Muat Soal</button>
<button onclick="downloadData()">Download Data.txt</button>

<div id="areaKuis"></div>

<script>
let soalList = [];

function muatSoal(){
  const teks = document.getElementById('notepad').value.trim();
  soalList = teks.split('\n').filter(b => b.trim()!='').map(baris => {
    const [tanya, a, b, c, benar] = baris.split('|');
    return {tanya, opsi:[a,b,c], benar};
  });
  tampilSoal();
}

function tampilSoal(){
  let html = '';
  soalList.forEach((s,i) => {
    html += `<div class="soal"><b>${i+1}. ${s.tanya}</b><br>`;
    s.opsi.forEach(opt => {
      html += `<button onclick="cekJawaban(${i},'${opt}')">${opt}</button>`;
    });
    html += `<div id="hasil${i}"></div></div>`;
  });
  document.getElementById('areaKuis').innerHTML = html;
}

function cekJawaban(i, jawaban){
  const hasil = document.getElementById('hasil'+i);
  if(jawaban === soalList[i].benar){
    hasil.innerHTML = '<p class="benar">✅ Benar!</p>';
  } else {
    hasil.innerHTML = `<p class="salah">❌ Salah. Jawaban: ${soalList[i].benar}</p>`;
  }
}

function downloadData(){
  const data = document.getElementById('notepad').value;
  const blob = new Blob([data], {type: 'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'data_soal.txt';
  a.click();
}

muatSoal(); // auto load saat buka
</script>
</body>
</html>
